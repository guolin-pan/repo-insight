<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
    <defs>
        <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4F8EF7" />
            <stop offset="100%" stop-color="#8B5CF6" />
        </linearGradient>
        <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6C63FF" />
            <stop offset="100%" stop-color="#A855F7" />
        </linearGradient>
    </defs>
    <!-- Magnifying glass handle -->
    <line x1="42" y1="42" x2="56" y2="56" stroke="url(#g2)" stroke-width="7" stroke-linecap="round" />
    <!-- Magnifying glass lens -->
    <circle cx="28" cy="28" r="20" fill="none" stroke="url(#g1)" stroke-width="5" />
    <circle cx="28" cy="28" r="17" fill="#F0F4FF" opacity="0.5" />
    <!-- Code brackets  < >  inside lens -->
    <polyline points="22,20 16,28 22,36" fill="none" stroke="#4F8EF7" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" />
    <polyline points="34,20 40,28 34,36" fill="none" stroke="#8B5CF6" stroke-width="3.5"
        stroke-linecap="round" stroke-linejoin="round" />
    <!-- Small dot / node (git-like) -->
    <circle cx="28" cy="28" r="2.5" fill="#6C63FF" />
</svg>